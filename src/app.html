<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
        
        <!-- Base SEO -->
        <meta name="description" content="Cyber-Physical Portfolio of a Creative Full Stack Developer." />
        <meta name="keywords" content="SvelteKit, Cyberpunk, WebGL, Creative Coding, Developer Portfolio" />
        <meta name="theme-color" content="#050505" />
        
        <!-- Open Graph / Facebook -->
        <meta property="og:type" content="website" />
        <meta property="og:title" content="DEV_IO // CYBER_PORTFOLIO" />
        <meta property="og:description" content="Immersive cyberpunk portfolio showcasing high-performance web experiences." />
        <meta property="og:image" content="%sveltekit.assets%/og-image.jpg" />

        <!-- Twitter -->
        <meta property="twitter:card" content="summary_large_image" />
        <meta property="twitter:title" content="DEV_IO // CYBER_PORTFOLIO" />
        <meta property="twitter:description" content="Immersive cyberpunk portfolio showcasing high-performance web experiences." />
        <meta property="twitter:image" content="%sveltekit.assets%/og-image.jpg" />

        <!-- Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">


		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
